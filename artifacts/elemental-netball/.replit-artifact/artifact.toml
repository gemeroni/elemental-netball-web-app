kind = "web"
previewPath = "/"
title = "Elemental Netball"
version = "1.0.0"
id = "artifacts/elemental-netball"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21685

[services.development]
run = "pnpm --filter @workspace/elemental-netball run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/elemental-netball", "run", "build" ]
publicDir = "artifacts/elemental-netball/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21685"
BASE_PATH = "/"
