<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elemental Netball</title>
  <link rel="stylesheet" href="https://use.typekit.net/ofs4pze.css">
  <style>
/* ── Colour Temperature Position Logic — stylesheet ────────────────────────
   Edit this file to change layout, colours, spacing, and typography.
   Save, then refresh the browser tab to see changes.
   ────────────────────────────────────────────────────────────────────────── */

/* ── Variables (change colours here) ──────────────────────────────────────── */
:root {
  --GS: #E53935;
  --GA: #F4511E;
  --WA: #FB8C00;
  --C:  #43A047;
  --WD: #00838F;
  --GD: #1E88E5;
  --GK: #8E24AA;

  --fire: #E53935;
  --ice:  #1E88E5;

  --bg:   #F2F2F2;   /* page background */
  --card: #FFFFFF;   /* card background */
  --text: #1A1A1A;   /* primary text */
  --sub:  #666666;   /* secondary text */
  --rule: #E0E0E0;   /* dividers / borders */

  /* Court SVG rendered dimensions. Bib columns and thermometer match the
     height so all three vertical elements line up. The width is derived
     from the viewBox aspect (272 = 540 × 356.56 / 709.66). */
  --court-h: 600px;
  --court-w: 300px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'gamay', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ─────────────────────────────────────────────────────────────── */
header {
  background: #1A1A1A;
}
.header-inner {
  max-width: 1180px;
  margin: 0 auto;
  padding: 14px 24px 12px;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 24px;
}
.header-title h1 {
  font-size: 20px;
  font-weight: 900;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: white;
}
.header-title h1 span { color: #43A047; }
.header-title p {
  font-size: 13px;
  color: #888;
  margin-top: 4px;
  letter-spacing: 0.3px;
}
.header-controls {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
}

/* ── HOT / COLD toggle ───────────────────────────────────────────────────── */
.global-toggle {
  display: flex;
  border-radius: 8px;
  overflow: hidden;
  border: 2px solid #333;
}
.team-btn {
  padding: 10px 0;
  width: 130px;
  text-align: center;
  font-size: 15px;
  font-weight: 800;
  letter-spacing: 1px;
  font-family: 'gamay', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  border: none;
  background: transparent;
  color: #888;
  cursor: pointer;
  transition: background 0.2s, color 0.2s, box-shadow 0.25s;
  position: relative;
}
.team-btn.fire.active {
  background: var(--fire);
  color: white;
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,0.25),
    0 0 0 2px rgba(255,107,53,0.55),
    0 0 16px rgba(255,107,53,0.75),
    0 0 32px rgba(255,107,53,0.45);
  animation: ignite 1.6s ease-in-out infinite;
}
.team-btn.ice.active {
  background: var(--ice);
  color: white;
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,0.3),
    0 0 0 2px rgba(124,193,224,0.6),
    0 0 14px rgba(124,193,224,0.7),
    0 0 28px rgba(184,229,245,0.45);
  animation: frost 2.2s ease-in-out infinite;
}
@keyframes ignite {
  0%, 100% {
    box-shadow:
      inset 0 0 0 2px rgba(255,255,255,0.25),
      0 0 0 2px rgba(255,107,53,0.55),
      0 0 16px rgba(255,107,53,0.75),
      0 0 32px rgba(255,107,53,0.45);
  }
  50% {
    box-shadow:
      inset 0 0 0 2px rgba(255,255,255,0.45),
      0 0 0 3px rgba(255,165,0,0.7),
      0 0 22px rgba(255,107,53,0.95),
      0 0 44px rgba(255,150,40,0.55);
  }
}
@keyframes frost {
  0%, 100% {
    box-shadow:
      inset 0 0 0 2px rgba(255,255,255,0.3),
      0 0 0 2px rgba(124,193,224,0.6),
      0 0 14px rgba(124,193,224,0.7),
      0 0 28px rgba(184,229,245,0.45);
  }
  50% {
    box-shadow:
      inset 0 0 0 2px rgba(255,255,255,0.55),
      0 0 0 3px rgba(184,229,245,0.85),
      0 0 20px rgba(184,229,245,0.95),
      0 0 40px rgba(224,244,251,0.6);
  }
}
.team-btn:not(.active):hover { background: #2a2a2a; color: #ccc; }

/* ── Matchup band (self | toggle | opp) ─────────────────────────────────── */
.matchup-band {
  background: var(--card);
  border-bottom: 1px solid var(--rule);
}
/* Padding mirrors zones-layout's outer padding so self/opp block edges
   line up with the bib-col / info-col edges in the diagram below. */
.matchup-band-inner {
  max-width: 1180px;
  margin: 0 auto;
  padding: 26px 28px 22px;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 24px;
  align-items: end;
}
.matchup-side {
  display: flex;
  flex-direction: column;
  gap: 12px;
  transform-origin: top center;
}
/* Sides are FIXED: fire on the left, ice on the right. They never swap. */
.matchup-side.fire-side { align-items: flex-start; }
.matchup-side.ice-side  { align-items: flex-end; }
.matchup-side.ice-side .matchup-text { text-align: right; }

/* Both sides stay full-strength regardless of which team is active - the
   active state is conveyed by the central toggle's ignite/frost effect. */

/* Team toggle: centred horizontally between the two sides, vertically nudged
   down toward the bottom of the band. */
.matchup-toggle {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  padding-bottom: 6px;
  padding-top: 56px;
}

.intent-pill {
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  padding: 7px 18px;
  border-radius: 20px;
  background: var(--card);
  display: inline-block;
}
.matchup-side.fire-side .intent-pill {
  color: var(--fire);
  border: 2px solid var(--fire);
  filter: url(#fire-border);
}
.matchup-side.ice-side .intent-pill {
  color: var(--ice);
  border: 2px solid var(--ice);
  filter: url(#frost-border);
}

.matchup-row {
  display: flex;
  gap: 16px;
  align-items: center;
}
.big-bib {
  width: 96px;
  height: 96px;
  flex-shrink: 0;
}
.matchup-text { line-height: 1.25; }
.team-role {
  font-size: 20px;
  font-weight: 900;
  letter-spacing: 0.3px;
  margin-bottom: 5px;
}
.matchup-side.fire-side .team-role { color: var(--fire); }
.matchup-side.ice-side  .team-role { color: var(--ice);  }
.pos-name {
  font-size: 17px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 5px;
}
.pos-tagline {
  font-size: 14px;
  color: var(--sub);
  font-style: italic;
}

/* ── Bib selector rows (horizontal, above & below the landscape court) ──── */
/* Width matches the landscape court so bibs distribute evenly across. */
.bib-col {
  display: flex;
  flex-direction: row;
  justify-content: space-around;
  align-items: center;
  width: 600px;
  padding: 0 16px;
  justify-self: center;
}
.pos-tab {
  border: none;
  background: none;
  padding: 0;
  cursor: pointer;
  opacity: 0.4;
  border-radius: 8px;
  outline: none;
}
.pos-tab img {
  width: 48px;
  height: 48px;
  display: block;
}
/* Active team's bibs read in full colour; only the opposing-team column
   stays muted so the eye knows where the ball is. */
body.team-active-fire .fire-tab,
body.team-active-ice  .ice-tab { opacity: 1; }
.pos-tab.opp-match { opacity: 0.85; }
.pos-tab:hover { opacity: 1; }

/* Selected position: scaled up + team-coloured halo on top of full opacity */
.pos-tab.active { transform: scale(1.32); }
body.team-active-fire .pos-tab.active {
  filter:
    drop-shadow(0 0 14px rgba(229,57,53,0.65))
    drop-shadow(0 3px 8px rgba(0,0,0,0.3));
}
body.team-active-ice .pos-tab.active {
  filter:
    drop-shadow(0 0 14px rgba(30,136,229,0.65))
    drop-shadow(0 3px 8px rgba(0,0,0,0.3));
}

/* ── Inline position bib (used in info text) ────────────────────────────── */
.inline-bib {
  display: inline-block;
  width: 26px;
  height: 26px;
  vertical-align: middle;
  position: relative;
  top: -2px;
}

.pos-tab { outline: none; }

/* ── View toggle (now lives inside header on the right) ─────────────────── */
.view-toggle {
  display: flex;
  gap: 0;
}
.view-btn {
  padding: 4px 14px;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-family: 'gamay', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  border: none;
  background: transparent;
  color: #555;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
}
.view-btn.active {
  color: white;
  border-bottom-color: #43A047;
}
.view-btn:not(.active):hover { color: #aaa; }

/* ── View panels ─────────────────────────────────────────────────────────── */
.view-panel { display: none; }
.view-panel.active { display: block; }

/* ── Section label ───────────────────────────────────────────────────────── */
.section-label {
  text-align: center;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--sub);
  padding: 20px 20px 0;
}

/* ── Section 1: zones layout ─────────────────────────────────────────────── */
/* 3 rows × 3 cols. Fire bibs sit above the landscape court, ice bibs below.
   Thermometer and info-col stack to the right of the court block. */
.zones-layout {
  max-width: 1180px;
  margin: 0 auto;
  padding: 24px 28px 32px;
  display: grid;
  grid-template-columns: 880px;
  grid-template-rows: auto auto auto auto auto;
  grid-template-areas:
    "details"
    "fire"
    "court"
    "ice"
    "matchup";
  row-gap: 18px;
  align-items: center;
  justify-content: center;
  justify-items: center;
}
.zones-layout > .pos-details      { grid-area: details; width: 100%; }
.zones-layout > .bib-col.fire-col { grid-area: fire; }
.zones-layout > .zone-col         { grid-area: court; }
.zones-layout > .bib-col.ice-col  { grid-area: ice; }
.zones-layout > .opponent-section { grid-area: matchup; width: 100%; }

/* Thermometer: flat tube + smooth outline + subtle drop-shadow on slider.
   Motion effects and tube-edge filters are intentionally disabled - team
   activity is now conveyed by the central toggle's ignite/frost glow. */
.motion-boil, .motion-freeze { display: none; }

#thermo-slider {
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.25));
}
.thermo-ticks { pointer-events: none; }
#thermo-mercury { transition: y 0.2s, height 0.2s, fill 0.2s; }

/* ── Section 2: ball tracker ─────────────────────────────────────────────── */
.tracker-section {
  background: #1a1a1a;
  padding: 32px 20px 40px;
  margin-top: 32px;
}
.tracker-header {
  text-align: center;
  margin-bottom: 20px;
}
.tracker-header h2 {
  font-size: 15px;
  font-weight: 900;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: white;
  margin-bottom: 6px;
}
.tracker-header p {
  font-size: 12px;
  color: #555;
  letter-spacing: 0.2px;
}
.tracker-layout {
  max-width: 340px;
  margin: 0 auto;
}
#tracker-svg {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 6px;
  overflow: visible;
}
.player-token {
  cursor: grab;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.28));
}
#tracker-ball {
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3));
}

/* Court tools (rotate / flip / snapshot) - small icon row above the court */
.court-tools {
  display: flex;
  justify-content: center;
  gap: 6px;
  padding: 0 0 10px;
}
.court-tool {
  width: 32px;
  height: 32px;
  border: 1px solid var(--rule);
  background: white;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, border-color 0.15s;
}
.court-tool:hover {
  background: #F5F5F5;
  border-color: #C0C0C0;
}
.court-tool:active { background: #E8E8E8; }

/* Court SVG rotates/flips around centre via JS-set inline transform */
#court-svg {
  transform-origin: center center;
  transition: transform 0.3s ease;
}

/* Mobile-only "tap to interact" lock — prevents accidental token drags
   while page is being scrolled. Activated via .court-locked class on .zone-col;
   tapping the frame removes the class and enables interactions. */
.court-lock-hint {
  display: none;
}
.zone-col.court-locked {
  cursor: pointer;
}
.zone-col.court-locked #court-svg {
  pointer-events: none;
}
.zone-col.court-locked .court-tools {
  pointer-events: auto;
}
.zone-col.court-locked .court-lock-hint {
  display: block;
  position: absolute;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(26, 26, 26, 0.85);
  color: white;
  padding: 7px 16px;
  border-radius: 16px;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  pointer-events: none;
  z-index: 4;
  animation: court-lock-pulse 2s ease-in-out infinite;
}
@keyframes court-lock-pulse {
  0%, 100% { opacity: 0.85; transform: translateX(-50%) scale(1); }
  50%      { opacity: 1;    transform: translateX(-50%) scale(1.04); }
}

/* ── Left column: thermometer + court side by side ───────────────────────── */
.left-col {
  display: flex;
  gap: 16px;
  align-items: flex-start;
}

/* ── Thermometer SVG ─────────────────────────────────────────────────────── */
/* Hidden for now — markup + JS retained for easy revival. */
#thermo-svg {
  display: none;
}
.thermo-ball {
  cursor: pointer;
  transition: opacity 0.15s;
}
.thermo-ball:not(.active) { opacity: 0.5; }
.thermo-ball:hover:not(.active) { opacity: 0.85; }
.thermo-ball .active-ring { display: none; }
.thermo-ball.active .active-ring { display: block; }

/* ── Court zone diagram ──────────────────────────────────────────────────── */
/* Zone-col sizes to its content (the court + even whitespace around it) so
   the caption below wraps to that width instead of stretching the frame.
   In landscape mode (90° / 270° rotation) the frame swaps aspect to
   accommodate the rotated visual (540 × 271 instead of 272 × 540). */
.zone-col {
  background: var(--card);
  border-radius: 12px;
  padding: 16px;
  border: 1px solid var(--rule);
  flex: 0 0 auto;
  overflow: hidden;
  position: relative;
  transition: width 0.3s ease, height 0.3s ease;
}
.zone-col.landscape {
  width: 632px;             /* 600 visual + 16 padding × 2 */
  height: 358px;            /* 8 top pad + 42 tools row + 300 court visual + 8 bottom pad */
  padding: 8px 16px;
}
.zone-col.landscape #court-svg {
  position: absolute;
  top: calc(50% + 21px);    /* shifts visual centre below the tools row at top */
  left: 50%;
  margin: 0;
  /* JS sets transform: translate(-50%, -50%) rotate(R) scaleX(SX) scaleY(SY)
     so the rotated visual is centred within the resized frame. */
}
.zone-col.landscape .zone-caption {
  display: none;
}
#court-svg {
  width: var(--court-w);
  height: var(--court-h);
  display: block;
  margin: 0 auto;
  border-radius: 6px;
  overflow: visible;
}

.zone-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--sub);
  margin-bottom: 10px;
}
/* Caption wraps to the court width rather than stretching the card */
.zone-caption {
  font-size: 14px;
  color: var(--sub);
  line-height: 1.5;
  margin: 14px auto 0;
  text-align: center;
  max-width: 272px;
}

/* ── Info column (right) ─────────────────────────────────────────────────── */
.info-col {
  display: flex;
  flex-direction: column;
  gap: 0;
}

/* Role / Zone / Note rows */
.pos-details {
  background: var(--card);
  padding: 4px 28px 18px;
  border: 1px solid var(--rule);
  border-radius: 12px;
}
.detail-row {
  font-size: 15px;
  line-height: 1.55;
  color: #444;
  padding: 12px 0;
  border-bottom: 1px solid var(--rule);
}
.detail-row:last-child { border-bottom: none; }
.detail-row strong {
  color: var(--text);
  font-weight: 700;
  display: block;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 4px;
}

/* Opponent block - colour flips based on which team is the opponent */
.opponent-section {
  border-radius: 12px;
  padding: 18px 28px 22px;
}
.opponent-section.opp-ice {
  background: #EEF4FB;
  border: 1px solid #C5D9EF;
  border-left: 4px solid var(--ice);
}
.opponent-section.opp-ice .opponent-heading { color: var(--ice); }
.opponent-section.opp-fire {
  background: #FFF1EE;
  border: 1px solid #F4C5B0;
  border-left: 4px solid var(--fire);
}
.opponent-section.opp-fire .opponent-heading { color: var(--fire); }
.opponent-heading {
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
#matchup-text {
  font-size: 15px;
  line-height: 1.6;
  color: #444;
  margin-top: 4px;
}

/* ── Footer ──────────────────────────────────────────────────────────────── */
footer {
  text-align: center;
  padding: 28px 20px 32px;
}
.footer-tag {
  font-size: 14px;
  color: #888;
  font-style: italic;
  letter-spacing: 0.3px;
}
.footer-sig {
  font-size: 14px;
  color: #555;
  margin-top: 8px;
  letter-spacing: 1.5px;
  font-weight: 700;
}

  const bibSrc = (pos, team) => `${BIB_DIR}${BIB[team][pos]}`;
  // Temperament groups drive opposing-team detection in role/note/matchup
  // text injection: a referenced position is on the opposing team when its
  // group is opposite to currentPos's group (attack vs defend). Neutral (C)
  // is never auto-classified as opposing - use the {OPP} token for an
  // explicit "direct opponent" reference (needed for C-vs-C self-matchup).
  const POS_GROUP = {
    GS:'attack', GA:'attack', WA:'attack',
    C:'neutral',
    WD:'defend', GD:'defend', GK:'defend'
  };
  const isOpposingGroup = (code, refPos) => {
    const a = POS_GROUP[code], b = POS_GROUP[refPos];
    if (!a || !b || a === 'neutral' || b === 'neutral') return false;
    return a !== b;
  };
  let currentTeam = 'fire';

  // ── Court geometry ─────────────────────────────────────────────────────────

  const TOKEN_R = 18;

  const TOKEN_STARTS = {

  document.addEventListener('DOMContentLoaded', init);

  function init() {
    // Vertical bib selectors - one column per team, flanking the court.
    // Fire column: canonical order (GS top -> GK bottom).
    // Ice column: reversed (GK top -> GS bottom) to mirror court layout.
    const fireCol = document.getElementById('bib-col-fire');
    const iceCol  = document.getElementById('bib-col-ice');
    const buildTab = (code, team) => {
      const btn = document.createElement('button');
      btn.className   = `pos-tab ${team}-tab`;
      btn.dataset.pos = code;
      btn.dataset.team = team;
      btn.innerHTML   = `<img id="tab-img-${team}-${code}" src="${bibSrc(code, team)}" alt="${code}">`;
      btn.addEventListener('click', () => { setTeam(team); selectPos(code); });
      return btn;
    };
    ORDER.forEach(code => fireCol.appendChild(buildTab(code, 'fire')));
    [...ORDER].reverse().forEach(code => iceCol.appendChild(buildTab(code, 'ice')));

    document.querySelectorAll('.thermo-ball').forEach(b =>
      b.addEventListener('click', () => selectPos(b.dataset.pos)));

    initThermoSlider();
    initTrackerSection();
    initCourtTools();
    initCourtLock();
    courtRotation = 90;
    applyCourtTransform();
    selectPos('GS');
  }

  // On coarse-pointer devices (touch / mobile), the court starts locked: a
  // pulsing hint asks for a tap before any token-drag interactions are
  // enabled. Tools (rotate/flip/snapshot) stay tappable through the lock.
  function initCourtLock() {
    const zoneCol = document.querySelector('.zone-col');
    if (!zoneCol) return;
    if (!matchMedia('(pointer: coarse)').matches) return;
    zoneCol.classList.add('court-locked');
    zoneCol.addEventListener('click', e => {
      if (!zoneCol.classList.contains('court-locked')) return;
      if (e.target.closest('.court-tools')) return;
      zoneCol.classList.remove('court-locked');
      e.preventDefault();
      e.stopPropagation();
    }, true);
  }

  // ── Court rotate / flip / snapshot ────────────────────────────────────────
  let courtRotation = 0;        // 0, 90, 180, 270
  let courtFlipX    = 1;        // 1 or -1
  let courtFlipY    = 1;        // 1 or -1

  function applyCourtTransform() {
    const stage = document.getElementById('court-svg');
    const isLandscape = (courtRotation % 180) !== 0;
    // When the court rotates to landscape, the SVG element is positioned
    // absolutely + centred so the parent frame can size to the rotated
    // visual instead of the original portrait layout box. The translate
    // prefix is essential for centring inside a position:absolute context.
    const centring = isLandscape ? 'translate(-50%, -50%) ' : '';
    stage.style.transform =
      `${centring}rotate(${courtRotation}deg) scaleX(${courtFlipX}) scaleY(${courtFlipY})`;
    // Counter-transform on tokens + ball so bibs and netball graphic stay
    // upright and readable regardless of how the court is oriented.
    const counter = `scale(${courtFlipX} ${courtFlipY}) rotate(${-courtRotation})`;
    document.querySelectorAll('.token-inner, .ball-inner').forEach(el =>
      el.setAttribute('transform', counter));
    // Frame swaps to landscape dimensions when the rotated visual is wider
    // than tall (90° / 270°).
    document.querySelector('.zone-col')?.classList.toggle('landscape', isLandscape);
  }

  function initCourtTools() {
    document.getElementById('court-rotate').addEventListener('click', () => {
      courtRotation = (courtRotation + 90) % 360;
      applyCourtTransform();
    });
    document.getElementById('court-flip-h').addEventListener('click', () => {
      // "Flip ends" — swap the two long ends of the court regardless of
      // current orientation. In landscape that's a horizontal mirror; in
      // portrait it's a vertical mirror. Either way, goal thirds swap.
      const isLandscape = (courtRotation % 180) !== 0;
      if (isLandscape) courtFlipX *= -1;
      else             courtFlipY *= -1;
      applyCourtTransform();
    });
    document.getElementById('court-snapshot').addEventListener('click', captureCourtSnapshot);
  }

    // The live SVG carries an inline style.transform from applyCourtTransform
    // ("translate(-50%, -50%) rotate(90deg)..."). When the clone is rendered
    // standalone via new Image(), that CSS transform applies on top of our
    // <g> wrap rotation — doubling the rotation and leaving the tokens'
    // counter-rotation off by 180°. Strip it so only the wrap rotation acts.
    clone.style.transform = '';
    clone.style.transformOrigin = '';
    // The ball uses <use href="#nb-stroke"> and <use href="#nb-fill">; both
    // symbols live in thermo-svg's <defs>. Cross-SVG <use> resolves on the
    // live page but breaks once we serialise the court alone — so copy the
    // symbol definitions into the clone's <defs> before serialising.
    const externalDefs = document.getElementById('thermo-svg')?.querySelector('defs');
    let cloneDefs = clone.querySelector('defs');
    if (!cloneDefs) {
      cloneDefs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
      clone.insertBefore(cloneDefs, clone.firstChild);
    }
    if (externalDefs) {
      ['nb-stroke', 'nb-fill'].forEach(symId => {
        if (clone.querySelector(`#${symId}`)) return;
        const sym = externalDefs.querySelector(`#${symId}`);
        if (sym) cloneDefs.appendChild(sym.cloneNode(true));
      });
    }
    // Compose flip + rotate so the result lands inside a viewBox sized for
    // the current orientation. Portrait viewBox = PW × PH; landscape (90° /
    // 270°) swaps to PH × PW. SVG transform list reads left→right but applies
    // right→left to a point, so flips appear to the right of the rotation
    // (applied first to original content, then rotation maps into final box).
    const PW = 356.56, PH = 709.66;
    const isLandscapeCap = (courtRotation % 180) !== 0;
    const vbW = isLandscapeCap ? PH : PW;
    const vbH = isLandscapeCap ? PW : PH;
    const xformParts = [];
    switch (courtRotation) {
      case 90:  xformParts.push(`translate(${PH}, 0) rotate(90)`); break;
      case 180: xformParts.push(`translate(${PW}, ${PH}) rotate(180)`); break;
      case 270: xformParts.push(`translate(0, ${PW}) rotate(-90)`); break;
    }
    if (courtFlipX === -1) xformParts.push(`translate(${PW}, 0) scale(-1, 1)`);
    if (courtFlipY === -1) xformParts.push(`translate(0, ${PH}) scale(1, -1)`);
    if (xformParts.length) {
      const wrap = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      wrap.setAttribute('transform', xformParts.join(' '));
      while (clone.firstChild) wrap.appendChild(clone.firstChild);
      clone.appendChild(wrap);
    }
    clone.setAttribute('viewBox', `0 0 ${vbW} ${vbH}`);
    clone.setAttribute('width', vbW);
    clone.setAttribute('height', vbH);
    // Resolve every <image> href to a data URI so the rasteriser can find them
    const images = clone.querySelectorAll('image');
    for (const img of images) {
      const href = img.getAttribute('href') || img.getAttributeNS('http://www.w3.org/1999/xlink', 'href');
      if (!href || href.startsWith('data:')) continue;
      try {
        const res = await fetch(href);
        const blob = await res.blob();
        const dataUri = await new Promise(r => {
          const fr = new FileReader();
          fr.onload = () => r(fr.result);
          fr.readAsDataURL(blob);
        });
        img.setAttribute('href', dataUri);
      } catch (e) { /* ignore - will render blank */ }
    }
    const xml = new XMLSerializer().serializeToString(clone);
    const svgBlob = new Blob([xml], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);
    const img = new Image();
    img.onload = () => {
      const scale = 2; // 2x for crisp output
      const canvas = document.createElement('canvas');
      canvas.width = vbW * scale;
      canvas.height = vbH * scale;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      canvas.toBlob(blob => {
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `netball-court-${Date.now()}.png`;
        link.click();
        URL.revokeObjectURL(link.href);
      }, 'image/png');
      URL.revokeObjectURL(url);
    };
    img.src = url;
  }

  // ── Thermometer slider ─────────────────────────────────────────────────────
  const THERMO_Y     = { GS: 0.5,    GA: 113.5, WA: 234.05, C: 354.83, WD: 473.16, GD: 596.1, GK: 709.16 };
  const THERMO_Y_ICE = { GS: 709.16, GA: 596.1, WA: 473.16, C: 354.83, WD: 234.05, GD: 113.5, GK: 0.5  };
  const getActiveThermoY = () => currentTeam === 'ice' ? THERMO_Y_ICE : THERMO_Y;
  let thermoDragging = false;

  function thermoSvgPt(e) {
    const svg = document.getElementById('thermo-svg');
    const pt  = svg.createSVGPoint();
    const src = e.touches ? e.touches[0] : e;
    pt.x = src.clientX; pt.y = src.clientY;
    return pt.matrixTransform(svg.getScreenCTM().inverse());
  }

  // Bib colour for a given position+team. Fire uses the canonical position
  // colour; ice uses the matchup partner's colour (so ice GS = purple to
  // match its bib, ice GK = red to match its bib, etc.).
  function bibColour(pos, team) {
    return team === 'ice' ? POS[POS[pos].opponent].colour : POS[pos].colour;
  }

  function moveSliderTo(cy) {
    document.getElementById('thermo-slider').setAttribute('transform', `translate(0, ${cy})`);
    const colour = bibColour(currentPos, currentTeam);
    document.getElementById('thermo-slider-ball').setAttribute('fill', colour);
    // Mercury column fills from the marker's Y down to the bottom of the tube
    // and is tinted in the current bib colour (matches the selected bib).
    const mercury = document.getElementById('thermo-mercury');
    if (mercury) {
      mercury.setAttribute('y', cy);
      mercury.setAttribute('height', Math.max(0, 709.16 - cy));
      mercury.setAttribute('fill', colour);
    }
  }

  function moveSliders() {
    moveSliderTo(getActiveThermoY()[currentPos]);
  }

  function onThermoMove(e) {
    if (!thermoDragging) return;
    if (e.cancelable) e.preventDefault();
    const pt = thermoSvgPt(e);
    const y  = Math.max(0.5, Math.min(709.16, pt.y));
    // Move slider freely
    document.getElementById('thermo-slider').setAttribute('transform', `translate(0, ${y})`);
    // Snap to nearest position using the active team's Y mapping (fire is
    // canonical, ice is mirrored so the same gradient colour at a Y still
    // resolves to the position whose bib is that colour).
    const yMap = getActiveThermoY();
    const nearest = ORDER.reduce((a, b) =>
      Math.abs(yMap[b] - y) < Math.abs(yMap[a] - y) ? b : a);
    if (nearest !== currentPos) {
      currentPos = nearest;
      document.getElementById('thermo-slider-ball').setAttribute('fill', bibColour(nearest, currentTeam));
      render();
    }
  }

  function endThermoDrag() {
    if (!thermoDragging) return;
    thermoDragging = false;
    document.getElementById('thermo-slider').style.cursor = 'grab';
    moveSliders();
  }

  function initThermoSlider() {
    const slider = document.getElementById('thermo-slider');
    slider.addEventListener('mousedown', e => {
      e.preventDefault();
      thermoDragging = true;
      slider.style.cursor = 'grabbing';
    });
    slider.addEventListener('touchstart', e => {
      e.preventDefault();
      thermoDragging = true;
    }, { passive: false });
    document.addEventListener('mousemove', onThermoMove);
    document.addEventListener('touchmove', onThermoMove, { passive: false });
    document.addEventListener('mouseup',  endThermoDrag);
    document.addEventListener('touchend', endThermoDrag);
  }

  // ── Section 1 ──────────────────────────────────────────────────────────────
  const ZONE_DEFS = {
    GS: { y1: CY,   y2: T1,   exTop: false, exBot: false },
    GA: { y1: CY,   y2: T2,   exTop: false, exBot: false },
    WA: { y1: CY,   y2: T2,   exTop: true,  exBot: false },
    C:  { y1: CY,   y2: CBOT, exTop: true,  exBot: true  },
    WD: { y1: T1,   y2: CBOT, exTop: false, exBot: true  },
    GD: { y1: T1,   y2: CBOT, exTop: false, exBot: false },
    GK: { y1: T2,   y2: CBOT, exTop: false, exBot: false },
  };
  // ICE team: zones are mirrored (GS attacks bottom, GK defends top)
  const ZONE_DEFS_ICE = {
    GS: { y1: T2,   y2: CBOT, exTop: false, exBot: false },
    GA: { y1: T1,   y2: CBOT, exTop: false, exBot: false },
    WA: { y1: T1,   y2: CBOT, exTop: false, exBot: true  },
    C:  { y1: CY,   y2: CBOT, exTop: true,  exBot: true  },
    WD: { y1: CY,   y2: T2,   exTop: true,  exBot: false },
    GD: { y1: CY,   y2: T2,   exTop: false, exBot: false },
    GK: { y1: CY,   y2: T1,   exTop: false, exBot: false },
  };

  // Convert a hex colour to a low-opacity rgba string for zone tinting.
  function hexToRgba(hex, a) {
    const h = hex.replace('#', '');
    const r = parseInt(h.substring(0, 2), 16);
    const g = parseInt(h.substring(2, 4), 16);
    const b = parseInt(h.substring(4, 6), 16);
    return `rgba(${r},${g},${b},${a})`;
  }

  // Fill the selected position's allowed zone with the full bib colour
   // (matches the bib of the active team - ice WD is yellow, not teal).
   // Goal-circle exclusions stay white so they cut cleanly out of the fill.
  function drawCourtZone(posCode) {
    const z    = (currentTeam === 'ice' ? ZONE_DEFS_ICE : ZONE_DEFS)[posCode];
    const fill = bibColour(posCode, currentTeam);
    let svg = '';
    svg += `<rect x="${CX}" y="${z.y1}" width="${CW}" height="${z.y2 - z.y1}" fill="${fill}"/>`;
    if (z.exTop)
      svg += `<circle cx="${GCX}" cy="${CY}" r="${GR}" fill="white"/>`;
    if (z.exBot)
      svg += `<circle cx="${GCX}" cy="${CBOT}" r="${GR}" fill="white"/>`;
    document.getElementById('zone-overlay').innerHTML = svg;
  }

  function setTeam(team) {
    currentTeam = team;
    document.querySelectorAll('.team-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.team-btn.${team}`).classList.add('active');
    moveSliders();
    render();
  }

  function selectPos(code) {
    currentPos = code;
    if (!thermoDragging) moveSliders();
    render();
  }

  function bibImg(code, team) {
    return `<img src="${bibSrc(code, team)}" class="inline-bib" alt="${code}" title="${POS[code].name}">`;
  }

  // Role/note: a referenced position renders in the opposing team's bib when
  // it sits in the opposite temperament group from currentPos (attackers vs
  // defenders); allies and neutral refs render in the CURRENT team's bib so
  // the inline icons match the team perspective the user is viewing. The
  // {OPP} token is an explicit "direct opponent in opposing team's bib".
  function injectBadges(text) {
    const oppTeam = currentTeam === 'fire' ? 'ice' : 'fire';
    const oppCode = POS[currentPos].opponent;
    return text.replace(/\{([A-Z]+)\}/g, (_, code) => {
      if (code === 'OPP') return bibImg(oppCode, oppTeam);
      if (!POS[code]) return code;
      const team = isOpposingGroup(code, currentPos) ? oppTeam : currentTeam;
      return bibImg(code, team);
    });
  }

  // Matchup: primary pos = current team; direct opponent or any opposing-
  // group position = opposing team; allies/neutral = current team. {OPP} is
  // the explicit direct-opponent token (lets C's matchup distinguish self
  // from the opposing C, which share the same code).
  function injectMatchup(text) {
    const oppTeam = currentTeam === 'fire' ? 'ice' : 'fire';
    const oppCode = POS[currentPos].opponent;
    return text.replace(/\{([A-Z]+)\}/g, (_, code) => {
      if (code === 'OPP') return bibImg(oppCode, oppTeam);
      if (!POS[code]) return code;
      if (code === currentPos) return bibImg(code, currentTeam);
      if ((code === oppCode && oppCode !== currentPos) || isOpposingGroup(code, currentPos)) {
        return bibImg(code, oppTeam);
      }
      return bibImg(code, currentTeam);
    });
  }

  // Map p.temp -> role label used in matchup band heading
  const ROLE_LABEL = { attack: 'ATTACKER', defend: 'DEFENDER', both: 'MIDCOURT' };

  function render() {
    const p        = POS[currentPos];
    const opponent = POS[p.opponent];
    const team     = currentTeam;

    drawCourtZone(currentPos);
    document.getElementById('zone-caption').textContent = p.zoneCaption;

    // Team class drives motion direction (fire boils/heats, ice freezes/cools),
    // marker glow tint, and the matchup-band side emphasis.
    document.body.classList.toggle('team-active-fire', team === 'fire');
    document.body.classList.toggle('team-active-ice',  team === 'ice');

    // Highlight selection across bib columns and on-court tokens
    document.querySelectorAll('.pos-tab, .player-token').forEach(b => {
      const isActiveSelf = b.dataset.team === team && b.dataset.pos === currentPos;
      b.classList.toggle('active', isActiveSelf);
    });

    // Matchup band: sides are FIXED (fire on left, ice on right). They show the
    // matchup PAIR - one position per team - regardless of which is selected.
    // Active team's side gets a zoom + flame/frost emphasis (in CSS).
    const fireSidePos = team === 'fire' ? currentPos : p.opponent;
    const iceSidePos  = team === 'ice'  ? currentPos : p.opponent;
    const fireSideP   = POS[fireSidePos];
    const iceSideP    = POS[iceSidePos];

    document.getElementById('fire-badge').src = bibSrc(fireSidePos, 'fire');
    document.getElementById('fire-team-role').textContent = `FIRE TEAM ${ROLE_LABEL[fireSideP.temp]}`;
    document.getElementById('fire-pos-name').textContent  = `${fireSidePos} is for ${fireSideP.name.toUpperCase()}`;
    document.getElementById('fire-tagline').textContent   = fireSideP.tagline;

    document.getElementById('ice-badge').src = bibSrc(iceSidePos, 'ice');
    document.getElementById('ice-team-role').textContent = `ICE TEAM ${ROLE_LABEL[iceSideP.temp]}`;
    document.getElementById('ice-pos-name').textContent  = `${iceSidePos} is for ${iceSideP.name.toUpperCase()}`;
    document.getElementById('ice-tagline').textContent   = iceSideP.tagline;

    // Detail block + matchup paragraph (tinted by opposing team)
    document.getElementById('pos-role').innerHTML        = injectBadges(p.role);
    document.getElementById('pos-zone-text').textContent = p.zone;
    document.getElementById('pos-note').innerHTML        = injectBadges(p.note);

    const opponentSection = document.querySelector('.opponent-section');
    opponentSection.classList.toggle('opp-ice',  team === 'fire');
    opponentSection.classList.toggle('opp-fire', team === 'ice');
    document.getElementById('matchup-text').innerHTML = injectMatchup(p.matchup);
  }

  // ── Section 2: tracker ─────────────────────────────────────────────────────
  function initTrackerSection() {
    const tokenGroup = document.getElementById('player-tokens');
    const ns = 'http://www.w3.org/2000/svg';

    const buildToken = (pos, team) => {
      const start = TOKEN_STARTS[team][pos];
      tokenPos[team][pos] = { x: start.x, y: start.y };

      const g = document.createElementNS(ns, 'g');
      g.id = `token-${team}-${pos}`;
      g.setAttribute('transform', `translate(${start.x},${start.y})`);
      g.setAttribute('class', `player-token ${team}-token`);
      g.dataset.pos  = pos;
      g.dataset.team = team;
      g.style.cursor = 'grab';
      g.style.touchAction = 'none';

      // Inner group keeps the bib upright when the court rotates / flips.
      // applyCourtTransform() sets a counter-transform on .token-inner.
      const inner = document.createElementNS(ns, 'g');
      inner.setAttribute('class', 'token-inner');
      const img = document.createElementNS(ns, 'image');
      img.setAttribute('href', bibSrc(pos, team));
      img.setAttribute('x', -TOKEN_R);
      img.setAttribute('y', -TOKEN_R);
      img.setAttribute('width',  TOKEN_R * 2);
      img.setAttribute('height', TOKEN_R * 2);
      img.setAttribute('preserveAspectRatio', 'xMidYMid meet');
      inner.appendChild(img);
      g.appendChild(inner);

      g.addEventListener('mousedown',  e => startDrag(e, 'token', pos, team));
      g.addEventListener('touchstart', e => startDrag(e, 'token', pos, team), { passive: false });
      return g;
    };

    // Stack ice tokens first so fire tokens render on top by default
    ORDER.forEach(pos => tokenGroup.appendChild(buildToken(pos, 'ice')));
    ORDER.forEach(pos => tokenGroup.appendChild(buildToken(pos, 'fire')));

    const ball = document.getElementById('tracker-ball');
    ball.addEventListener('mousedown',  e => startDrag(e, 'ball', null, null));
    ball.addEventListener('touchstart', e => startDrag(e, 'ball', null, null), { passive: false });

    document.addEventListener('mousemove', onTrackerMove);
    document.addEventListener('touchmove', onTrackerMove, { passive: false });
    document.addEventListener('mouseup',   onTrackerEnd);
    document.addEventListener('touchend',  onTrackerEnd);

    moveTrackerBall(178.28, 354.83);
  }

  function trackerSvgPt(e) {
    const svg = document.getElementById('court-svg');
    const pt  = svg.createSVGPoint();
    const src = e.touches ? e.touches[0] : e;
    pt.x = src.clientX; pt.y = src.clientY;
    return pt.matrixTransform(svg.getScreenCTM().inverse());
  }

  function startDrag(e, type, pos, team) {
    e.preventDefault();
    e.stopPropagation();
    currentDrag = { type, pos, team };
    if (type === 'token') {
      // Mousedown on a token also selects it (click-without-drag still
      // counts as a selection).
      if (team !== currentTeam) setTeam(team);
      if (pos !== currentPos)   selectPos(pos);
      const el = document.getElementById(`token-${team}-${pos}`);
      el.style.cursor = 'grabbing';
      document.getElementById('player-tokens').appendChild(el);
    } else {
      document.getElementById('tracker-ball').style.cursor = 'grabbing';
    }
  }

  function onTrackerMove(e) {
    if (!currentDrag) return;
    if (e.cancelable) e.preventDefault();
    const { x, y } = trackerSvgPt(e);
    if (currentDrag.type === 'ball') {
      moveTrackerBall(x, y);
    } else {
      moveToken(x, y, currentDrag.pos, currentDrag.team);
    }
  }

  function onTrackerEnd() {
    if (!currentDrag) return;
    if (currentDrag.type === 'token') {
      const el = document.getElementById(`token-${currentDrag.team}-${currentDrag.pos}`);
      if (el) el.style.cursor = 'grab';
    } else {
      document.getElementById('tracker-ball').style.cursor = 'grab';
    }
    currentDrag = null;
  }

  function moveTrackerBall(x, y) {
    x = Math.max(0.5, Math.min(356.06, x));
    y = Math.max(0.5, Math.min(709.16, y));
    document.getElementById('tracker-ball').setAttribute('transform', `translate(${x},${y})`);
  }

  function moveToken(x, y, pos, team) {
    const clamped = clampToZone(x, y, pos, team);
    tokenPos[team][pos] = clamped;
    document.getElementById(`token-${team}-${pos}`)
      .setAttribute('transform', `translate(${clamped.x},${clamped.y})`);
  }

  function clampToZone(x, y, pos, team) {
    const b = ZONE_BOUNDS[team][pos];
    // Clamp to court boundary and third bounds
    x = Math.max(0.5, Math.min(356.06, x));
    y = Math.max(b.yMin, Math.min(b.yMax, y));
    // Skip circle exclusion when on sideline
    if (x > 1.5 && x < 355.06) {
      if (b.exTop) {
        const d = Math.hypot(x - GCX, y - CY);
        if (d < GR) {
          const a = Math.atan2(y - CY, x - GCX);
          x = GCX + GR * Math.cos(a);
          y = Math.max(b.yMin, CY + GR * Math.sin(a));
          x = Math.max(0.5, Math.min(356.06, x));
        }
      }
      if (b.exBot) {
        const d = Math.hypot(x - GCX, y - CBOT);
        if (d < GR) {
          const a = Math.atan2(y - CBOT, x - GCX);
          x = GCX + GR * Math.cos(a);
          y = Math.min(b.yMax, CBOT + GR * Math.sin(a));
          x = Math.max(0.5, Math.min(356.06, x));
        }
      }
    }
    return { x, y };
  }
</script>

</body>
